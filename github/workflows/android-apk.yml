name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Limpar e validar recursos Android
        shell: bash
        run: |
          chmod +x scripts/clean_invalid_android_resources.sh
          scripts/clean_invalid_android_resources.sh
          echo "Arquivos finais em app/src/main/res:"
          find app/src/main/res -type f -printf '%P\n' | sort

      - name: Garantir AndroidX e memória do Gradle
        shell: bash
        run: |
          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
          EOF
          echo "Conteúdo de gradle.properties:"
          cat gradle.properties

      - name: Configurar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Diagnosticar dependências Kotlin
        shell: bash
        run: |
          gradle :app:dependencies --configuration debugRuntimeClasspath > dependencies-debug.txt
          grep -E "kotlin-stdlib|kotlin-stdlib-jdk7|kotlin-stdlib-jdk8" dependencies-debug.txt || true

      - name: Gerar APK
        shell: bash
        run: |
          set -o pipefail
          gradle :app:clean :app:assembleDebug --stacktrace --warning-mode all 2>&1 | tee build-apk.log

      - name: Executar auditoria Lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle :app:lintDebug --stacktrace 2>&1 | tee lint.log

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: Controle-Bar-v1.2.1-DEMO-PRO-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publicar logs de diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Controle-Bar-v1.2.1-DEMO-PRO-Logs
          path: |
            build-apk.log
            lint.log
            dependencies-debug.txt
            app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
